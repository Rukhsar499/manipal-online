	<style>
.thankyou-section {
    padding: 60px 15px;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;   /* horizontal center */
    align-items: center;       /* vertical center */
    background: #f5f5f5;
}

.thankyou-card {
    background: linear-gradient(135deg, #0A2A66, #1E5BB8);
    border-radius: 30px;
    padding: 60px;
    color: #fff;
}
.badge-custom {
    background: #ffc107;
    color: #000;
    font-size: 12px;
    letter-spacing: 2px;
    padding: 8px 16px;
    border-radius: 50px;
    display: inline-block;
    margin-bottom: 20px;
}
.padding-left{
  padding-left: 100px !important;
}
.thankyou-title {
    font-size: 56px;
    font-weight: 700;
    line-height: 1.2;
}
.thankyou-title span {
    color: #ffc107;
}
.thankyou-text {
       font-size: 24px;
    color: #d1d9f0;
    margin-top: 20px;
}
.thankyou-subtext {
    font-size: 15px;
    color: #c3cbee;
    margin-top: 20px;
}

/* Responsive */
@media (max-width: 992px) {
    .thankyou-card {
        padding: 40px 25px;
        text-align: center;
    }
    .thankyou-title {
        font-size: 40px;
    }
    .image-wrapper {
        margin-top: 40px;
    }
}
@media (max-width: 576px) {
    .thankyou-title {
        font-size: 32px;
    }
    .padding-left{
  padding-left: 0px !important;
}
}
	</style>
<body>
<!-- Body main wrapper start -->
<section class="thankyou-section mx-auto">
    <div class="container">
        <div class="thankyou-card">
          <div class="row">
                <!-- LEFT CONTENT -->
                <div class="col-lg-7 padding-left">
                    <div class="badge-custom">ADMISSIONS OPEN 2026-27</div>
                    <h4 class="thankyou-title">
                        Thank you <span>!</span>
                    </h4>
                    <p class="thankyou-text">
                        Thank you for your enquiry.<br>
    Our team will contact you shortly to guide you on
    <strong>fees</strong> and the <strong>admission process</strong>
                    </p>
                    
                </div>

                <!-- RIGHT IMAGE -->
                <div class="col-lg-5 text-center">
                        <img src="assets/img/c1.png" alt="Students" class="mt-4 img-fluid">
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
